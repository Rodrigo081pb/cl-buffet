<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A96E;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#6B2020;stop-opacity:0.5" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="url(#bgGradient)"/>
  
  <!-- Plate -->
  <circle cx="100" cy="110" r="60" fill="#F5ECD7" opacity="0.9"/>
  <circle cx="100" cy="110" r="55" fill="none" stroke="#C9A96E" stroke-width="2"/>
  
  <!-- Food icon (simplified dish) -->
  <ellipse cx="100" cy="110" rx="35" ry="25" fill="#6B2020" opacity="0.4"/>
  <ellipse cx="100" cy="105" rx="30" ry="20" fill="#8B3030" opacity="0.5"/>
  <ellipse cx="100" cy="100" rx="25" ry="15" fill="#A04040" opacity="0.6"/>
  
  <!-- Decorative elements -->
  <circle cx="85" cy="95" r="3" fill="#C9A96E" opacity="0.7"/>
  <circle cx="115" cy="95" r="3" fill="#C9A96E" opacity="0.7"/>
  <circle cx="100" cy="90" r="2" fill="#F5ECD7" opacity="0.8"/>
  
  <!-- Text -->
  <text x="100" y="170" font-family="'Playfair Display', serif" font-size="14" fill="#C9A96E" text-anchor="middle" opacity="0.8">
    CL Buffet
  </text>
</svg>
